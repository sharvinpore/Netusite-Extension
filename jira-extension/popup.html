<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jira My Tasks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e2a;
      --border: #252a38;
      --accent: #4f7cff;
      --accent2: #7c5cff;
      --success: #3ecf8e;
      --warn: #f5a623;
      --danger: #ff5c5c;
      --text: #e8eaf0;
      --muted: #6b7280;
      --mono: 'Courier New', 'Consolas', monospace;
      --sans: -apple-system, 'Segoe UI', system-ui, sans-serif;
    }

    body {
      width: 400px;
      min-height: 540px;
      max-height: 620px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
    }

    #app { display: flex; flex-direction: column; height: 100%; min-height: 540px; }

    /* HEADER */
    .header {
      padding: 14px 16px 11px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(79,124,255,0.07) 0%, transparent 100%);
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 24px; height: 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      box-shadow: 0 0 12px rgba(79,124,255,0.4);
    }
    .logo-text {
      font-size: 14px; font-weight: 800; letter-spacing: -0.3px;
      background: linear-gradient(90deg, #fff 40%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-actions { display: flex; gap: 5px; }
    .icon-btn {
      width: 27px; height: 27px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 13px; transition: all 0.15s;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(79,124,255,0.1); }

    /* BREADCRUMB */
    .breadcrumb {
      padding: 7px 16px; display: none; align-items: center; gap: 5px;
      font-size: 11px; font-family: var(--mono); color: var(--muted);
      border-bottom: 1px solid var(--border); background: var(--surface);
      flex-shrink: 0;
    }
    .breadcrumb.visible { display: flex; }
    .breadcrumb span { cursor: pointer; transition: color 0.15s; }
    .breadcrumb span:hover { color: var(--accent); }
    .breadcrumb .sep { opacity: 0.35; cursor: default; }
    .breadcrumb .active { color: var(--text); cursor: default; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* FILTER BAR */
    .filter-bar {
      padding: 8px 10px;
      display: none; gap: 5px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .filter-bar.visible { display: flex; }
    .filter-btn {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px; font-family: var(--mono); font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: rgba(79,124,255,0.15); border-color: var(--accent); color: var(--accent); }
    .filter-btn.active-inprogress { background: rgba(79,124,255,0.15); border-color: var(--accent); color: var(--accent); }
    .filter-btn.active-todo { background: rgba(107,114,128,0.2); border-color: #6b7280; color: #9ca3af; }
    .filter-btn.active-done { background: rgba(62,207,142,0.12); border-color: var(--success); color: var(--success); }
    .filter-count {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border-radius: 8px; padding: 0 5px;
      font-size: 10px; margin-left: 3px;
    }

    /* CONTENT */
    .content {
      flex: 1; overflow-y: auto; padding: 8px 0;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .section-label {
      padding: 3px 16px 7px;
      font-size: 10px; font-family: var(--mono);
      text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted);
    }

    /* PROJECT CARD */
    .project-card {
      margin: 3px 8px; padding: 10px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9px; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      transition: all 0.15s;
      animation: fadeIn 0.18s ease forwards; opacity: 0;
    }
    .project-card:hover { background: var(--surface2); border-color: var(--accent); transform: translateX(2px); }
    .project-avatar {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
    }
    .project-info { flex: 1; min-width: 0; }
    .project-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-meta { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 1px; }
    .project-count {
      background: rgba(79,124,255,0.15); color: var(--accent);
      border: 1px solid rgba(79,124,255,0.25); border-radius: 5px;
      padding: 2px 7px; font-size: 11px; font-family: var(--mono); font-weight: 600;
    }
    .chevron { color: var(--muted); font-size: 12px; transition: transform 0.15s; }
    .project-card:hover .chevron { transform: translateX(3px); color: var(--accent); }

    /* TASK ITEM */
    .task-item {
      margin: 3px 8px; padding: 9px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9px; cursor: pointer;
      transition: all 0.15s;
      animation: fadeIn 0.18s ease forwards; opacity: 0;
    }
    .task-item:hover { background: var(--surface2); border-color: rgba(79,124,255,0.4); }
    .task-top { display: flex; align-items: flex-start; gap: 7px; }
    .task-key {
      font-size: 10px; font-family: var(--mono); color: var(--accent);
      background: rgba(79,124,255,0.1); border: 1px solid rgba(79,124,255,0.2);
      border-radius: 4px; padding: 1px 5px; white-space: nowrap; flex-shrink: 0;
    }
    .task-title { font-size: 12px; font-weight: 600; line-height: 1.4; flex: 1; }
    .task-bottom { display: flex; align-items: center; gap: 5px; margin-top: 6px; flex-wrap: wrap; }

    /* BADGES */
    .badge { font-size: 10px; font-family: var(--mono); padding: 2px 6px; border-radius: 4px; font-weight: 600; }
    .badge-status-todo { background: rgba(107,114,128,0.2); color: #9ca3af; border: 1px solid rgba(107,114,128,0.3); }
    .badge-status-inprogress { background: rgba(79,124,255,0.15); color: var(--accent); border: 1px solid rgba(79,124,255,0.3); }
    .badge-status-done { background: rgba(62,207,142,0.12); color: var(--success); border: 1px solid rgba(62,207,142,0.25); }
    .badge-status-review { background: rgba(124,92,255,0.15); color: var(--accent2); border: 1px solid rgba(124,92,255,0.3); }
    .badge-priority-high { background: rgba(255,92,92,0.12); color: var(--danger); border: 1px solid rgba(255,92,92,0.25); }
    .badge-priority-medium { background: rgba(245,166,35,0.12); color: var(--warn); border: 1px solid rgba(245,166,35,0.25); }
    .badge-priority-low { background: rgba(62,207,142,0.1); color: var(--success); border: 1px solid rgba(62,207,142,0.2); }
    .badge-type { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .badge-label { background: rgba(124,92,255,0.1); color: var(--accent2); border: 1px solid rgba(124,92,255,0.2); }

    /* ── TICKET DETAIL ───────────────────────────────── */
    .detail-panel {
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
    }
    .detail-scroll { flex: 1; overflow-y: auto; padding: 10px 14px 14px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .detail-scroll::-webkit-scrollbar { width: 3px; }
    .detail-scroll::-webkit-scrollbar-thumb { background: var(--border); }

    .detail-header { margin-bottom: 10px; }
    .detail-key-row { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; flex-wrap: wrap; }
    .detail-title { font-size: 14px; font-weight: 800; line-height: 1.4; margin-bottom: 10px; }

    .detail-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }

    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-bottom: 12px;
    }
    .detail-field { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 9px; }
    .detail-field-label { font-size: 9px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 3px; }
    .detail-field-value { font-size: 12px; font-weight: 600; }

    .detail-section { margin-bottom: 12px; }
    .detail-section-title {
      font-size: 10px; font-family: var(--mono); text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 6px;
      padding-bottom: 5px; border-bottom: 1px solid var(--border);
    }
    .detail-description {
      font-size: 12px; line-height: 1.6; color: #c4c8d4;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 9px 10px;
      max-height: 100px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      white-space: pre-wrap; word-break: break-word;
    }

    .subtask-item {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 9px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px; margin-bottom: 4px;
    }
    .subtask-key { font-size: 10px; font-family: var(--mono); color: var(--accent); }
    .subtask-title { font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .comment-item {
      padding: 8px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 7px; margin-bottom: 5px;
    }
    .comment-meta { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .comment-author { font-size: 11px; font-weight: 700; color: var(--accent); }
    .comment-date { font-size: 10px; font-family: var(--mono); color: var(--muted); }
    .comment-body { font-size: 11px; line-height: 1.5; color: #c4c8d4; word-break: break-word; }

    .detail-open-btn {
      width: 100%; padding: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 8px;
      font-size: 12px; font-family: var(--sans); font-weight: 700;
      cursor: pointer; margin-top: 10px;
      box-shadow: 0 3px 12px rgba(79,124,255,0.25);
      transition: all 0.15s;
    }
    .detail-open-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(79,124,255,0.35); }

    /* DETAIL LOADER */
    .detail-loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; padding: 50px 20px;
    }

    /* SETTINGS */
    .settings-panel { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .field-group { display: flex; flex-direction: column; gap: 4px; }
    .field-label { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .field-input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 10px; color: var(--text);
      font-size: 12px; font-family: var(--mono); outline: none;
      transition: border-color 0.15s; width: 100%;
    }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: var(--muted); }
    .field-hint { font-size: 10px; color: var(--muted); line-height: 1.4; }
    .field-hint a { color: var(--accent); text-decoration: none; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 7px;
      padding: 9px 14px; font-size: 13px; font-family: var(--sans);
      font-weight: 700; cursor: pointer; transition: all 0.15s;
      box-shadow: 0 3px 12px rgba(79,124,255,0.25);
    }
    .btn-primary:hover { transform: translateY(-1px); }

    /* STATUS BAR */
    .status-bar {
      padding: 7px 16px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; font-family: var(--mono); color: var(--muted);
      background: var(--surface); flex-shrink: 0;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--success);
      display: inline-block; margin-right: 5px;
      box-shadow: 0 0 5px var(--success); animation: pulse 2s infinite;
    }
    .status-dot.offline { background: var(--muted); box-shadow: none; animation: none; }

    /* MISC */
    .empty-state { padding: 36px 18px; text-align: center; color: var(--muted); }
    .empty-icon { font-size: 30px; margin-bottom: 8px; opacity: 0.4; }
    .empty-text { font-size: 12px; line-height: 1.5; }
    .error-banner {
      margin: 7px 8px; padding: 9px 12px;
      background: rgba(255,92,92,0.08); border: 1px solid rgba(255,92,92,0.25);
      border-radius: 7px; font-size: 11px; color: var(--danger);
      font-family: var(--mono); line-height: 1.4;
    }
    .loader { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .spinner {
      width: 22px; height: 22px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .loader-text { font-size: 11px; font-family: var(--mono); color: var(--muted); }
    .no-tasks { padding: 16px; text-align: center; font-size: 12px; color: var(--muted); }

    /* ANIMATIONS */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .project-card:nth-child(1){animation-delay:.03s} .project-card:nth-child(2){animation-delay:.06s}
    .project-card:nth-child(3){animation-delay:.09s} .project-card:nth-child(4){animation-delay:.12s}
    .project-card:nth-child(5){animation-delay:.15s}
    .task-item:nth-child(1){animation-delay:.03s} .task-item:nth-child(2){animation-delay:.06s}
    .task-item:nth-child(3){animation-delay:.09s} .task-item:nth-child(4){animation-delay:.12s}
    .task-item:nth-child(5){animation-delay:.15s} .task-item:nth-child(6){animation-delay:.18s}
    .task-item:nth-child(7){animation-delay:.21s} .task-item:nth-child(8){animation-delay:.24s}
    .refresh-spin { animation: spin 0.7s linear !important; }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">&#11041;</div>
        <span class="logo-text">Jira Tasks</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="refreshBtn" title="Refresh">&#8635;</button>
        <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
      </div>
    </div>

    <div class="breadcrumb" id="breadcrumb">
      <span id="bc-home">Projects</span>
      <span class="sep">&#8250;</span>
      <span id="bc-project" class="active"></span>
      <span class="sep" id="bc-sep2" style="display:none">&#8250;</span>
      <span id="bc-ticket" class="active" style="display:none"></span>
    </div>

    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all" id="f-all">All <span class="filter-count" id="fc-all">0</span></button>
      <button class="filter-btn" data-filter="inprogress" id="f-inprogress">&#9654; In Progress <span class="filter-count" id="fc-inprogress">0</span></button>
      <button class="filter-btn" data-filter="todo" id="f-todo">&#9702; To Do <span class="filter-count" id="fc-todo">0</span></button>
      <button class="filter-btn" data-filter="done" id="f-done">&#10003; Done <span class="filter-count" id="fc-done">0</span></button>
    </div>

    <div class="content" id="content"></div>

    <div class="status-bar" id="statusBar">
      <span><span class="status-dot offline" id="statusDot"></span><span id="statusText">Not connected</span></span>
      <span id="lastSync"></span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
